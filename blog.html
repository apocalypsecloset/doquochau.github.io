    :root {

    body {

      padding: 18px 32px; border-bottom: 1px solid var(--border);

    }
    .back-link {

    /* PAGE HERO */

      text-align: center; padding: 80px 32px 56px;
      border-bottom: 1px solid var(--border);
    }
    .page-kicker {
      font-size: 10px; letter-spacing: 0.4em; color: var(--red);
      text-transform: uppercase; margin-bottom: 20px;
    }
    .page-title {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: clamp(48px, 8vw, 96px);
      text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.1;
    }
    .page-desc {
      font-size: 12px; color: var(--muted); letter-spacing: 0.1em;
      margin-top: 20px; max-width: 480px; margin-left: auto; margin-right: auto;
      line-height: 1.8;
    }

    /* FILTER */
    .filter-bar {
      display: flex; gap: 8px; padding: 24px 40px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active { color: var(--white); border-color: var(--white); }
    .filter-btn.active { background: var(--white); color: var(--black); }

    /* GRID */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0; background: var(--black); padding-bottom: 80px;
    }

    /* CARD */
    .post-card[hidden] { display: none !important; }
    .post-card {
      background: var(--black); display: flex; flex-direction: column; border: 1px solid var(--border); margin: -1px 0 0 -1px;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .post-card:hover { background: var(--grey); }

    .card-cover {
      width: 100%; aspect-ratio: 3/4; overflow: hidden;
      background: var(--grey); flex-shrink: 0;
    }
    .card-cover img {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(0.7) contrast(1.05);
      transition: filter 0.3s, transform 0.4s;
    }
    .post-card:hover .card-cover img {
      filter: grayscale(0.3) contrast(1.1); transform: scale(1.02);
    }

    .card-body {
      padding: 20px 24px 28px; display: flex; flex-direction: column; gap: 10px;
    }
    .card-meta {
      display: flex; gap: 12px; align-items: center;
      font-size: 10px; letter-spacing: 0.25em; color: var(--red); text-transform: uppercase;
    }
    .card-meta .dot { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }

    /* KEY FIX: Barlow Condensed handles Vietnamese diacritics without overlapping */
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.3;
      color: var(--white);
    }
    .card-desc { font-size: 11px; color: var(--muted); line-height: 1.9; flex: 1; }
    .card-link {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-top: 6px; display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.15s;
    }
    .post-card:hover .card-link { color: var(--white); }

    /* LOADING */
    .state-screen {
      grid-column: 1 / -1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 40vh; gap: 16px;
    }
    .state-screen p { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    .spinner {
      width: 28px; height: 28px; border: 1px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { padding: 32px; border-top: 1px solid #1a1a1a; text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.2em; }

    @media (max-width: 768px) {
      header { padding: 14px 16px; }
      .page-hero { padding: 48px 20px 40px; }
      .filter-bar { padding: 16px 20px; }
      .post-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>

    const BATCH = 12;
    const STEP  = 4;
    let activeTag = 'all';
    let visibleLimit = BATCH;

    const urlTag = new URLSearchParams(window.location.search).get('tag');
    if (urlTag) activeTag = urlTag;

    renderCards();
    buildFilterBar();
    filterPosts(activeTag);

    document.getElementById('load-more-btn').addEventListener('click', () => {
      visibleLimit += STEP;
      applyVisibility();
    });

    function renderCards() {
      const grid = document.getElementById('post-grid');
      grid.innerHTML = '';
      POSTS.forEach(post => {
        const loading = POSTS.indexOf(post) < 6 ? 'eager' : 'lazy';
        const a = document.createElement('a');
        a.className = 'post-card';
        a.href = `blog/${post.slug}.html`;
        a.dataset.tags = post.tags.join(' ');
        a.innerHTML = `
          <div class="card-cover">
            <img src="${post.cover}" alt="${post.coverAlt}" loading="${loading}">
          </div>
          <div class="card-body">
            <div class="card-meta">
              <span>${post.category}</span>
              <span class="dot"></span>
              <span>${post.date}</span>
            </div>
            <h2 class="card-title">${post.shortTitle}</h2>
            <p class="card-desc">${post.description}</p>
            <span class="card-link">Đọc thêm →</span>
          </div>`;
        grid.appendChild(a);
      });
    }

    function buildFilterBar() {
      const bar = document.getElementById('filter-bar');
      if (!bar) return;
      const tags = [...new Set(POSTS.flatMap(p => p.tags))];
      tags.forEach(tag => {
        if ([...bar.querySelectorAll('.filter-btn')].some(b => b.dataset.tag === tag)) return;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.tag = tag;
        btn.textContent = tag;
        btn.onclick = () => filterPosts(tag);
        bar.appendChild(btn);
      });
    }

    function filterPosts(tag) {
      activeTag = tag || 'all';
      visibleLimit = BATCH;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tag === activeTag);
      });
      applyVisibility();
    }

    function applyVisibility() {
      const cards = [...document.querySelectorAll('#post-grid .post-card')];

      function cardMatches(card) {
        if (activeTag === 'all') return true;
        const tags = (card.dataset.tags || '').split(' ').filter(Boolean);
        return tags.includes(activeTag);
      }

      const matched = cards.filter(cardMatches);
      const shown = Math.min(visibleLimit, matched.length);

      cards.forEach(card => { card.hidden = true; });
      matched.slice(0, shown).forEach(card => { card.hidden = false; });

      const wrap = document.getElementById('load-more-wrap');
      if (wrap) wrap.hidden = shown >= matched.length;

      let es = document.getElementById('post-empty-state');
      if (!es) {
        es = document.createElement('div');
        es.id = 'post-empty-state';
        es.className = 'state-screen';
        es.innerHTML = '<p>Chưa có bài nào với tag này.</p>';
        document.body.appendChild(es);
      }
      es.style.display = matched.length === 0 ? 'block' : 'none';
    }

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Journal — Apocalypse Closet</title>
  <meta name="description" content="Bài viết về thời trang dark wear, tâm lý học và bản sắc từ Apocalypse Closet.">
  <link rel="canonical" href="https://apocalypsecloset.com/blog.html">
  <meta property="og:title" content="The Journal — Apocalypse Closet">
  <meta property="og:description" content="Bài viết về thời trang dark wear, tâm lý học và bản sắc.">
  <meta property="og:image" content="https://apocalypsecloset.com/Logo-Apocalypse-Closet.webp">
  <meta property="og:url" content="https://apocalypsecloset.com/blog.html">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/webp" href="Logo-Apocalypse-Closet.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #0a0a0a; --white: #f0ece4; --red: #c0392b;
      --grey: #141414; --muted: #777; --border: #222;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'Space Mono', monospace; min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px; border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.95); position: sticky; top: 0;
      backdrop-filter: blur(8px); z-index: 100;
    }
    .back-link {
      font-size: 11px; letter-spacing: 0.12em; color: var(--muted);
      text-decoration: none; text-transform: uppercase; transition: color 0.15s;
    }
    .back-link:hover { color: var(--white); }
    .nav-badge {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 18px; letter-spacing: 0.15em; color: var(--white); text-transform: uppercase;
    }

    /* PAGE HERO */
    .page-hero {
      text-align: center; padding: 80px 32px 56px;
      border-bottom: 1px solid var(--border);
    }
    .page-kicker {
      font-size: 10px; letter-spacing: 0.4em; color: var(--red);
      text-transform: uppercase; margin-bottom: 20px;
    }
    .page-title {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: clamp(48px, 8vw, 96px);
      text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.1;
    }
    .page-desc {
      font-size: 12px; color: var(--muted); letter-spacing: 0.1em;
      margin-top: 20px; max-width: 480px; margin-left: auto; margin-right: auto;
      line-height: 1.8;
    }

    /* FILTER */
    .filter-bar {
      display: flex; gap: 8px; padding: 24px 40px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active { color: var(--white); border-color: var(--white); }
    .filter-btn.active { background: var(--white); color: var(--black); }

    /* GRID */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px; background: var(--border); padding-bottom: 80px;
    }

    /* CARD */
    .post-card {
      background: var(--black); display: flex; flex-direction: column;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .post-card:hover { background: var(--grey); }

    .card-cover {
      width: 100%; aspect-ratio: 3/4; overflow: hidden;
      background: var(--grey); flex-shrink: 0;
    }
    .card-cover img {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(0.7) contrast(1.05);
      transition: filter 0.3s, transform 0.4s;
    }
    .post-card:hover .card-cover img {
      filter: grayscale(0.3) contrast(1.1); transform: scale(1.02);
    }

    .card-body {
      padding: 20px 24px 28px; display: flex; flex-direction: column; gap: 10px;
    }
    .card-meta {
      display: flex; gap: 12px; align-items: center;
      font-size: 10px; letter-spacing: 0.25em; color: var(--red); text-transform: uppercase;
    }
    .card-meta .dot { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }

    /* KEY FIX: Barlow Condensed handles Vietnamese diacritics without overlapping */
    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.3;
      color: var(--white);
    }
    .card-desc { font-size: 11px; color: var(--muted); line-height: 1.9; flex: 1; }
    .card-link {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-top: 6px; display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.15s;
    }
    .post-card:hover .card-link { color: var(--white); }

    /* LOADING */
    .state-screen {
      grid-column: 1 / -1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 40vh; gap: 16px;
    }
    .state-screen p { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    .spinner {
      width: 28px; height: 28px; border: 1px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      padding: 48px 32px; border-top: 1px solid var(--border);
      text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.2em;
    }

    @media (max-width: 768px) {
      header { padding: 14px 16px; }
      .page-hero { padding: 48px 20px 40px; }
      .filter-bar { padding: 16px 20px; }
      .post-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>

  <!-- ✅ SCHEMA: Blog -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "The Journal — Apocalypse Closet",
    "description": "Bài viết về thời trang dark wear, tâm lý học và bản sắc từ Apocalypse Closet.",
    "url": "https://apocalypsecloset.com/blog.html",
    "inLanguage": "vi",
    "publisher": {
      "@type": "Organization",
      "name": "Apocalypse Closet",
      "logo": {
        "@type": "ImageObject",
        "url": "https://apocalypsecloset.com/Logo-Apocalypse-Closet.webp"
      }
    }
  }
  </script>

  <!-- ✅ SCHEMA: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://apocalypsecloset.com" },
      { "@type": "ListItem", "position": 2, "name": "The Journal", "item": "https://apocalypsecloset.com/blog.html" }
    ]
  }
  </script>
</head>
<body>

  <header>
    <a class="back-link" href="index.html">← Manifesto</a>
    <span class="nav-badge">The Journal</span>
    <div style="width: 80px;"></div>
  </header>

  <div class="page-hero">
    <p class="page-kicker">Apocalypse Closet</p>
    <h1 class="page-title">The Journal</h1>
    <p class="page-desc">Thời trang. Tâm lý. Bản sắc. Những thứ không dành cho người muốn hoà tan vào đám đông.</p>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-tag="all" onclick="filterPosts('all')">All</button>
  </div>

  <div class="post-grid" id="post-grid">
    <div class="state-screen">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <footer>© 2026 APOCALYPSE CLOSET</footer>

  <script>
    let allPosts = [];
    let activeTag = 'all';

    const urlTag = new URLSearchParams(window.location.search).get('tag');
    if (urlTag) activeTag = urlTag;

    fetch('posts.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        allPosts = data;
        buildFilterBar();
        renderGrid(activeTag);
      })
      .catch(() => {
        document.getElementById('post-grid').innerHTML =
          '<div class="state-screen"><p>Không tải được bài viết.</p></div>';
      });

    function buildFilterBar() {
      const bar = document.getElementById('filter-bar');
      const tags = [...new Set(allPosts.flatMap(p => p.tags))];
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (tag === activeTag ? ' active' : '');
        btn.dataset.tag = tag;
        btn.textContent = tag;
        btn.onclick = () => filterPosts(tag);
        bar.appendChild(btn);
      });
      if (activeTag !== 'all') {
        bar.querySelector('[data-tag="all"]').classList.remove('active');
      }
    }

    function filterPosts(tag) {
      activeTag = tag;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tag === tag);
      });
      renderGrid(tag);
    }

    function renderGrid(tag) {
      const filtered = tag === 'all' ? allPosts : allPosts.filter(p => p.tags.includes(tag));
      const grid = document.getElementById('post-grid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="state-screen"><p>Chưa có bài nào với tag này.</p></div>';
        return;
      }
      grid.innerHTML = filtered.map((post, i) => `
        <a class="post-card" href="journal.html?slug=${post.slug}">
          <div class="card-cover">
            <img src="${post.cover}" alt="${escapeHTML(post.coverAlt || '')}"
                 loading="${i < 4 ? 'eager' : 'lazy'}">
          </div>
          <div class="card-body">
            <div class="card-meta">
              <span>${escapeHTML(post.category)}</span>
              <span class="dot"></span>
              <span>${escapeHTML(post.date)}</span>
            </div>
            <h2 class="card-title">${escapeHTML(post.shortTitle || post.title)}</h2>
            <p class="card-desc">${escapeHTML(post.description)}</p>
            <span class="card-link">Read more →</span>
          </div>
        </a>
      `).join('');
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>

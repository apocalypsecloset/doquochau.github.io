<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Apocalypse Closet</title>

  <!-- Google One Tap SDK -->
  <script src="https://accounts.google.com/gsi/client"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=optional" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=optional"></noscript>
  

  <style>
    :root {
      --black:   #080808;
      --white:   #f0ece4;
      --red:     #c0392b;
      --dim:     #1a1a1a;
      --border:  #2a2a2a;
      --muted:   #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Red bleed top-right */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(192,57,43,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Back link */
    .back {
      position: fixed;
      top: 24px;
      left: 28px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
      z-index: 10;
    }
    .back:hover { color: var(--white); }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(400px, 92vw);
      padding: 48px 40px 44px;
      border: 1px solid var(--border);
      background: rgba(12,12,12,0.85);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--red);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    /* Heading */
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 6px;
      color: var(--white);
      text-align: center;
    }
    .sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 36px;
      text-align: center;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Custom Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 13px 20px;
      background: var(--dim);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover {
      border-color: var(--white);
      background: #1f1f1f;
    }
    .btn-google svg { flex-shrink: 0; }

    /* Footer note */
    .note {
      margin-top: 32px;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.8;
    }
    .note a { color: var(--red); text-decoration: none; }
    .note a:hover { text-decoration: underline; }

    /* User info box (shown after login) */
    #user-box { display: none; text-align: center; }
    #user-box img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--red);
      margin-bottom: 14px;
      object-fit: cover;
    }
    #user-box .user-name {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #user-box .user-email {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 24px;
    }
    .btn-enter {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.16em;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      text-align: center;
    }
    .btn-enter:hover { opacity: 0.85; }

    .btn-signout {
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      cursor: pointer;
      width: 100%;
      text-align: center;
      text-transform: uppercase;
    }
    .btn-signout:hover { color: var(--white); }
  </style>
</head>
<body>

  <a href="https://doquochau.github.io/index.html" class="back">← Back</a>

  <!--
    ★ Client ID của Apocalypse Closet
  -->
  <div id="g_id_onload"
    data-client_id="1022057009412-pnvkbpd7n6u7j017i70j632s3qm17cuq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_select="false"
    data-cancel_on_tap_outside="false">
  </div>

  <div class="card">

    <div class="logo-wrap">
      <img src="Logo-Apocalypse-Closet.webp" width="52" height="52" fetchpriority="high" alt="icon" style="height: 52px; width: auto; object-fit: contain;">
      <img src="wordmark.webp" width="79" height="36" alt="Apocalypse Closet" style="height: 36px; width: auto; object-fit: contain; mix-blend-mode: screen;">
    </div>

    <!-- ── LOGIN STATE ── -->
    <div id="login-box">
      <h1>WELCOME<br>BACK</h1>
      <p class="sub">Sign in to access your closet</p>

      <div class="divider">Continue with</div>

      <!-- Google tự render nút vào đây -->
      <div id="google-btn-wrap" style="display:flex; justify-content:center;"></div>

      <p class="note">
        Bằng cách đăng nhập, bạn đồng ý với<br>
        <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>
      </p>
    </div>

    <!-- ── LOGGED IN STATE ── -->
    <div id="user-box">
      <img id="user-avatar" src="" alt="avatar" />
      <div class="user-name" id="user-name"></div>
      <div class="user-email" id="user-email"></div>
      <a href="https://doquochau.github.io/closet.html" class="btn-enter">ENTER MY CLOSET →</a>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>

  </div>

  <script>
    const CLIENT_ID = '1022057009412-pnvkbpd7n6u7j017i70j632s3qm17cuq.apps.googleusercontent.com';

    // ── Decode JWT UTF-8 ─────────────────────────────────────────
    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64).split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join('')
      );
      return JSON.parse(jsonPayload);
    }

    // ── Callback sau khi chọn tài khoản ─────────────────────────
    function handleCredentialResponse(response) {
      const user = parseJwt(response.credential);
      localStorage.setItem('ac_user', JSON.stringify({
        name:    user.name,
        email:   user.email,
        picture: user.picture,
        sub:     user.sub
      }));
      showUserBox(user);
    }

    // ── Hiện thông tin user ──────────────────────────────────────
    function showUserBox(user) {
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('user-box').style.display  = 'block';
      document.getElementById('user-avatar').src         = user.picture;
      document.getElementById('user-name').textContent   = user.name;
      document.getElementById('user-email').textContent  = user.email;
    }

    // ── Sign out ─────────────────────────────────────────────────
    function signOut() {
      localStorage.removeItem('ac_user');
      document.getElementById('user-box').style.display  = 'none';
      document.getElementById('login-box').style.display = 'block';
      google.accounts.id.disableAutoSelect();
    }

    // ── Khởi tạo khi trang load xong ────────────────────────────
    window.addEventListener('load', () => {
      // Nếu đã login rồi thì hiện thẳng
      const stored = localStorage.getItem('ac_user');
      if (stored) {
        showUserBox(JSON.parse(stored));
        return;
      }

      // Khởi tạo Google Identity Services
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback:  handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: false,
      });

      // Render nút Google chuẩn vào #google-btn-wrap
      google.accounts.id.renderButton(
        document.getElementById('google-btn-wrap'),
        {
          theme: 'filled_black',
          size:  'large',
          width: 320,
          text:  'continue_with',
          shape: 'rectangular',
          logo_alignment: 'left',
        }
      );

      // Hiện popup One Tap (nếu browser cho phép)
      google.accounts.id.prompt();
    });
  </script>

</body>
</html>

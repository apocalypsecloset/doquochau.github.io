<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfit Detail - Apocalypse Closet</title>
  <link rel="icon" type="image/webp" href="Logo-Apocalypse-Closet.webp">
  <link rel="canonical" href="https://apocalypsecloset.com/outfit-detail.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"></noscript>
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f0ece4;
      --red: #c0392b;
      --grey: #1a1a1a;
      --muted: #444;
      --muted-light: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.3;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      height: 36px;
      padding: 0 16px;
      border: 1px solid #333;
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: var(--white); color: var(--black); border-color: var(--white); }

    /* category tag in header */
    .cat-badge {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 4px 10px;
      opacity: 0.8;
    }

    /* save button states */
    #btn-save { border-color: #333; color: var(--white); }
    #btn-save.saved { border-color: var(--red); color: var(--red); }
    #btn-save:hover { background: var(--red); color: var(--white); border-color: var(--red); }

    /* ── MAIN LAYOUT ── */
    .detail-container {
      display: flex;
      padding: 48px 32px;
      gap: 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── SLIDER ── */
    .outfit-image-col { flex: 1; position: relative; }

    .slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3/4;
      overflow: hidden;
      border: 1px solid #222;
      background: var(--grey);
      margin: 0 auto;
    }

    .slider-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }

    .slider-track img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(10,10,10,0.8);
      border: 1px solid #444;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      border-radius: 50%;
      transition: border-color 0.2s;
    }
    .slider-btn:hover { border-color: var(--white); }
    .btn-prev { left: 12px; }
    .btn-next { right: 12px; }

    .slider-dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: all 0.2s; cursor: pointer; }
    .dot.active { background: var(--white); transform: scale(1.5); }

    /* ── INFO COLUMN ── */
    .outfit-info-col { flex: 1; }

    .outfit-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--red);
      margin-bottom: 8px;
    }

    .outfit-desc {
      font-size: 12px;
      color: var(--muted-light);
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .section-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }

    .items-list { display: flex; flex-direction: column; gap: 10px; }

    .item-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: #111;
      border: 1px solid #222;
      text-decoration: none;
      color: var(--white);
      transition: all 0.2s;
    }
    .item-link:hover { border-color: var(--muted-light); background: #1a1a1a; transform: translateX(5px); }
    .item-link.no-link { cursor: default; opacity: 0.5; }
    .item-link.no-link:hover { transform: none; border-color: #222; background: #111; }

    .item-left { display: flex; align-items: center; gap: 16px; }
    .item-icon { color: var(--red); font-size: 12px; }
    .item-text h3 { font-size: 13px; font-weight: bold; letter-spacing: 0.05em; }
    .item-text p { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; }
    .item-arrow { font-size: 14px; color: var(--muted); }

    /* ── RELATED ── */
    .related-section {
      padding: 40px 32px 48px;
      border-top: 1px solid #1a1a1a;
      max-width: 1200px;
      margin: 0 auto;
    }
    .related-label {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }
    .related-card {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--grey);
      cursor: pointer;
      position: relative;
    }
    .related-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.3s;
      filter: saturate(0.8);
    }
    .related-card:hover img { transform: scale(1.06); filter: saturate(1.1); }
    .related-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .related-card:hover::after { opacity: 1; }
    .related-card-tag {
      position: absolute;
      bottom: 12px; left: 12px;
      font-size: 9px; letter-spacing: 0.2em;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .related-card:hover .related-card-tag { opacity: 1; }

    /* ── NOT FOUND ── */
    .not-found {
      text-align: center;
      padding: 120px 32px;
      width: 100%;
    }
    .not-found h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--red); margin-bottom: 12px; }
    .not-found p { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

    footer { padding: 32px; border-top: 1px solid #1a1a1a; text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.2em; }

    @media (max-width: 768px) {
      header { padding: 14px 16px; }
      .detail-container { flex-direction: column; padding: 20px 16px; gap: 32px; }
      .outfit-title { font-size: 36px; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .related-section { padding: 32px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="javascript:history.back()" class="btn">← BACK</a>
      <span class="cat-badge" id="cat-badge"></span>
    </div>
    <button class="btn" id="btn-save">♡ SAVE</button>
  </header>

  <main class="detail-container" id="main-content"></main>
  <div id="related-wrap"></div>

  <footer>© 2026 APOCALYPSE CLOSET</footer>

  <!-- Load shared data -->
  <script src="outfits.js"></script>

  <script>
    // ── FIND OUTFIT ───────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const outfitId  = urlParams.get('id');
    const outfit    = outfits.find(o => o.id === outfitId);
    const mainEl    = document.getElementById('main-content');
    let currentSlide = 0;

    // ── SLIDER LOGIC ──────────────────────────────────────────────
    function moveSlide(dir) {
      const track = document.getElementById('slider-track');
      const dots  = document.querySelectorAll('.dot');
      const total = dots.length;
      currentSlide = (currentSlide + dir + total) % total;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }

    function goToSlide(idx) {
      const track = document.getElementById('slider-track');
      const dots  = document.querySelectorAll('.dot');
      currentSlide = idx;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }

    // ── AUTH / SAVE ───────────────────────────────────────────────
    function getUser() {
      try { return JSON.parse(localStorage.getItem('ac_user')); } catch { return null; }
    }
    function getClosetKey() {
      const u = getUser();
      return u ? `ac_closet_${u.sub}` : null;
    }

    function initSaveBtn() {
      if (!outfit) return;
      const btn = document.getElementById('btn-save');
      const key = getClosetKey();
      let list = [];
      try { list = JSON.parse(localStorage.getItem(key)) || []; } catch {}
      const isSaved = list.some(o => o.id === outfit.id);
      btn.innerHTML = isSaved ? '♥ SAVED' : '♡ SAVE';
      if (isSaved) btn.classList.add('saved');

      btn.addEventListener('click', () => {
        if (!getUser()) { window.location.href = 'login.html'; return; }
        const k = getClosetKey();
        let lst = [];
        try { lst = JSON.parse(localStorage.getItem(k)) || []; } catch {}
        const idx = lst.findIndex(o => o.id === outfit.id);
        if (idx === -1) {
          lst.push({ id: outfit.id, title: outfit.title, image: outfit.img, category: outfit.category, savedAt: Date.now() });
          btn.innerHTML = '♥ SAVED'; btn.classList.add('saved');
        } else {
          lst.splice(idx, 1);
          btn.innerHTML = '♡ SAVE'; btn.classList.remove('saved');
        }
        localStorage.setItem(k, JSON.stringify(lst));
      });
    }

    // ── RENDER DETAIL ─────────────────────────────────────────────
    if (outfit && outfit.detail) {
      const d = outfit.detail;

      // update page title + category badge
      document.title = `${d.title} — Apocalypse Closet`;
      document.getElementById('cat-badge').textContent = outfit.category;

      // ── SEO: inject meta + schema dynamically ──────────────────
      const pageUrl = `https://apocalypsecloset.com/outfit-detail.html?id=${outfit.id}`;

      function setMeta(nameOrProp, content, isLink = false) {
        if (isLink) {
          let el = document.querySelector(`link[rel="${nameOrProp}"]`);
          if (!el) { el = document.createElement('link'); el.rel = nameOrProp; document.head.appendChild(el); }
          el.href = content;
        } else {
          const isOg = nameOrProp.startsWith('og:') || nameOrProp.startsWith('twitter:');
          const attr = isOg ? 'property' : 'name';
          let el = document.querySelector(`meta[${attr}="${nameOrProp}"]`);
          if (!el) { el = document.createElement('meta'); el.setAttribute(attr, nameOrProp); document.head.appendChild(el); }
          el.content = content;
        }
      }

      function injectSchema(obj) {
        const el = document.createElement('script');
        el.type = 'application/ld+json';
        el.textContent = JSON.stringify(obj);
        document.head.appendChild(el);
      }

      // Canonical
      setMeta('canonical', pageUrl, true);

      // Meta description
      setMeta('description', d.desc);

      // Open Graph
      setMeta('og:title', `${d.title} — Apocalypse Closet`);
      setMeta('og:description', d.desc);
      setMeta('og:image', `https://apocalypsecloset.com${d.imgs[0]}`);
      setMeta('og:url', pageUrl);
      setMeta('og:type', 'website');

      // Twitter Card
      setMeta('twitter:card', 'summary_large_image');
      setMeta('twitter:title', `${d.title} — Apocalypse Closet`);
      setMeta('twitter:description', d.desc);
      setMeta('twitter:image', `https://apocalypsecloset.com${d.imgs[0]}`);

      // Schema: ItemList (outfit + shopping links)
      injectSchema({
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": d.title,
        "description": d.desc,
        "url": pageUrl,
        "image": `https://apocalypsecloset.com${d.imgs[0]}`,
        "numberOfItems": d.items.length,
        "itemListElement": d.items.map((item, i) => ({
          "@type": "ListItem",
          "position": i + 1,
          "name": item.name,
          "url": item.link && item.link !== '#' ? item.link : pageUrl
        }))
      });

      // Schema: BreadcrumbList
      injectSchema({
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://apocalypsecloset.com/" },
          { "@type": "ListItem", "position": 2, "name": "Outfits", "item": "https://apocalypsecloset.com/outfits.html" },
          { "@type": "ListItem", "position": 3, "name": d.title, "item": pageUrl }
        ]
      });

      // Helper: thêm size param cho Google Drive URLs
      const imgUrl = (url, size) => url.includes('googleusercontent.com') ? url + size : url;

      // build slider images — ảnh đầu load ngay (LCP), các ảnh sau lazy
      const imagesHTML = d.imgs.map((img, i) =>
        i === 0
          ? `<img src="${imgUrl(img, '=w900')}" alt="${d.title}" fetchpriority="high" decoding="async">`
          : `<img src="${imgUrl(img, '=w900')}" alt="${d.title}" loading="lazy" decoding="async">`
      ).join('');

      // build dots
      const dotsHTML = d.imgs.length > 1
        ? d.imgs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')
        : '';

      // build items list
      const itemsHTML = d.items.map(item => {
        const hasLink = item.link && item.link !== '#';
        return `
          <a href="${hasLink ? item.link : '#'}"
             ${hasLink ? 'target="_blank" rel="nofollow noopener"' : ''}
             class="item-link${hasLink ? '' : ' no-link'}">
            <div class="item-left">
              <div class="item-icon">✦</div>
              <div class="item-text">
                <h3>${item.name}</h3>
                <p>${item.type}${hasLink ? '' : ' — COMING SOON'}</p>
              </div>
            </div>
            <div class="item-arrow">${hasLink ? '→' : '—'}</div>
          </a>`;
      }).join('');

      mainEl.innerHTML = `
        <div class="outfit-image-col">
          <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">${imagesHTML}</div>
            ${d.imgs.length > 1 ? `
              <button class="slider-btn btn-prev" onclick="moveSlide(-1)">❮</button>
              <button class="slider-btn btn-next" onclick="moveSlide(1)">❯</button>
              <div class="slider-dots">${dotsHTML}</div>
            ` : ''}
          </div>
        </div>
        <div class="outfit-info-col">
          <h1 class="outfit-title">${d.title}</h1>
          <p class="outfit-desc">${d.desc}</p>
          <div class="section-title">
            <span>DANH SÁCH MUA ĐỒ</span>
            <span>${d.items.length} MÓN</span>
          </div>
          <div class="items-list">${itemsHTML}</div>
        </div>
      `;

      // ── RELATED OUTFITS (same category, excluding current) ─────
      const related = outfits
        .filter(o => o.category === outfit.category && o.id !== outfit.id)
        .slice(0, 4);

      if (related.length > 0) {
        const relHTML = related.map(o => `
          <div class="related-card" onclick="window.location.href='outfit-detail.html?id=${o.id}'">
            <img src="${imgUrl(o.img, '=w600')}" alt="${o.tag}" loading="lazy" decoding="async">
            <div class="related-card-tag">${o.tag}</div>
          </div>
        `).join('');

        document.getElementById('related-wrap').innerHTML = `
          <div class="related-section">
            <div class="related-label">More ${outfit.category}</div>
            <div class="related-grid">${relHTML}</div>
          </div>
        `;
      }

      initSaveBtn();

    } else {
      // outfit not found
      mainEl.innerHTML = `
        <div class="not-found">
          <h1>OUTFIT NOT FOUND</h1>
          <p>Look này không tồn tại hoặc chưa được thêm vào outfits.js</p>
        </div>`;
    }
  </script>
</body>
</html>

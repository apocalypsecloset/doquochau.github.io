<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfit Detail - Apocalypse Closet</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/doquochau/doquochau.github.io/master/Logo%20Apocalypse%20Closet.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f0ece4;
      --red: #c0392b;
      --grey: #1a1a1a;
      --muted: #444;
      --muted-light: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hiệu ứng nhiễu nhẹ cho nền */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.3;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      height: 36px;
      padding: 0 16px;
      border: 1px solid #333;
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }

    .detail-container {
      display: flex;
      padding: 48px 32px;
      gap: 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* === FIX LỖI SLIDER TẠI ĐÂY === */
    .outfit-image-col {
      flex: 1;
      position: relative;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3/4;
      overflow: hidden;
      border: 1px solid #222;
      background: var(--grey);
      margin: 0 auto;
    }

    /* Cực kỳ quan trọng: Track phải có display flex để ảnh dàn hàng ngang */
    .slider-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }

    .slider-track img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Để ảnh không bị méo */
      flex-shrink: 0;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(10,10,10,0.8);
      border: 1px solid #444;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      border-radius: 50%;
    }
    .btn-prev { left: 16px; }
    .btn-next { right: 16px; }

    .slider-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
    .dot.active { background: var(--white); transform: scale(1.5); }

    /* === INFO COLUMN === */
    .outfit-info-col { flex: 1; }

    .outfit-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--red);
      margin-bottom: 8px;
    }

    .outfit-desc {
      font-size: 12px;
      color: var(--muted-light);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .section-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
    }

    .items-list { display: flex; flex-direction: column; gap: 12px; }

    .item-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: #111;
      border: 1px solid #222;
      text-decoration: none;
      color: var(--white);
      transition: 0.2s;
    }

    .item-link:hover {
      border-color: var(--muted-light);
      background: #1a1a1a;
      transform: translateX(5px);
    }

    .item-left { display: flex; align-items: center; gap: 16px; }
    .item-icon { color: var(--red); }
    .item-text h3 { font-size: 13px; font-weight: bold; }
    .item-text p { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    @media (max-width: 768px) {
      .detail-container { flex-direction: column; padding: 16px; }
      .outfit-title { font-size: 36px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="btn">← BACK</a>
    <button class="btn">♡ SAVE</button>
  </header>

  <main class="detail-container" id="main-content">
    </main>

  <script>
    const outfitDatabase = {
      "look-01": {
        title: "OUTFIT DETAILS #1",
        desc: "Nhấn vào từng mục để xem chi tiết sản phẩm.",
        imgs: [
          "https://apocalypsecloset.wordpress.com/wp-content/uploads/2026/05/ee1ee67b6b076a4b62ceca86663dbec1.jpg",
          "https://apocalypsecloset.wordpress.com/wp-content/uploads/2026/05/eccacee3e4312af2ca62887a8953ffcb.jpg",
          "https://apocalypsecloset.wordpress.com/wp-content/uploads/2026/05/eccacee3e4312af2ca62887a8953ffcb.jpg",
          "https://apocalypsecloset.wordpress.com/wp-content/uploads/2026/05/eccacee3e4312af2ca62887a8953ffcb.jpg"
        ],
        // ĐÃ SỬA THÀNH DẠNG BASIC - Bạn chỉ cần thay Link Shopee
        items: [
          { name: "ÁO", type: "Top Item", link: "#" },
          { name: "QUẦN", type: "Bottom Item", link: "#" },
          { name: "GIÀY", type: "Footwear", link: "#" },
          { name: "PHỤ KIỆN 01", type: "Accessories", link: "#" },
          { name: "PHỤ KIỆN 02", type: "Accessories", link: "#" }
        ]
      }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const outfitId = urlParams.get('id') || "look-01"; // Mặc định look-01 để bạn test
    const mainContent = document.getElementById('main-content');
    let currentSlideIndex = 0;

    function moveSlide(direction) {
      const track = document.getElementById('slider-track');
      const dots = document.querySelectorAll('.dot');
      const totalSlides = dots.length;
      currentSlideIndex = (currentSlideIndex + direction + totalSlides) % totalSlides;
      track.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
      dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlideIndex));
    }

    if (outfitDatabase[outfitId]) {
      const outfit = outfitDatabase[outfitId];
      
      let imagesHTML = outfit.imgs.map(img => `<img src="${img}" alt="outfit">`).join('');
      let dotsHTML = outfit.imgs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('');
      
      let itemsHTML = outfit.items.map(item => `
        <a href="${item.link}" target="_blank" class="item-link">
          <div class="item-left">
            <div class="item-icon">✦</div>
            <div class="item-text">
              <h3>${item.name}</h3>
              <p>${item.type}</p>
            </div>
          </div>
          <div class="item-arrow">→</div>
        </a>
      `).join('');

      mainContent.innerHTML = `
        <div class="outfit-image-col">
          <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">${imagesHTML}</div>
            ${outfit.imgs.length > 1 ? `
              <button class="slider-btn btn-prev" onclick="moveSlide(-1)">❮</button>
              <button class="slider-btn btn-next" onclick="moveSlide(1)">❯</button>
              <div class="slider-dots">${dotsHTML}</div>
            ` : ''}
          </div>
        </div>
        <div class="outfit-info-col">
          <h1 class="outfit-title">${outfit.title}</h1>
          <p class="outfit-desc">${outfit.desc}</p>
          <div class="section-title">
            <span>DANH SÁCH MUA ĐỒ</span>
            <span>${outfit.items.length} MÓN</span>
          </div>
          <div class="items-list">${itemsHTML}</div>
        </div>
      `;
    } else {
      mainContent.innerHTML = `<div style="text-align:center; width:100%; padding-top:100px;"><h1>OUTFIT NOT FOUND</h1></div>`;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Tìm outfit, style và bài viết trong Apocalypse Closet.">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="vi_VN">

  <meta property="og:description" content="Tìm outfit, style và bài viết trong Apocalypse Closet.">
  <meta property="og:image" content="https://apocalypsecloset.com/Logo-Apocalypse-Closet.webp">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Search — Apocalypse Closet">
  <meta name="twitter:description" content="Tìm outfit, style và bài viết trong Apocalypse Closet.">
  <meta name="twitter:image" content="https://apocalypsecloset.com/Logo-Apocalypse-Closet.webp">

  <link rel="icon" type="image/webp" href="/Logo-Apocalypse-Closet.webp">
  <link rel="apple-touch-icon" href="/Logo-Apocalypse-Closet.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"></noscript>

  <style>
    :root {
      --black: #0a0a0a;
      --white: #f0ece4;
      --red: #c0392b;
      --red-text: #e05444;
      --grey: #111;
      --muted: #777;
      --line: #222;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.18;
      pointer-events: none;
      z-index: 999;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(8px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      min-height: 36px;
      padding: 0 16px;
      border: 1px solid #333;
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: var(--white);
      color: var(--black);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 52px 0 72px;
    }

    .eyebrow {
      color: var(--red-text);
      font-size: 10px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(44px, 9vw, 96px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 span { color: var(--red); }

    .search-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin: 28px 0 16px;
      border: 1px solid var(--line);
      background: #0f0f0f;
      padding: 12px;
    }

    .search-form input {
      width: 100%;
      background: transparent;
      border: 0;
      border-bottom: 1px solid #333;
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.08em;
      outline: none;
      padding: 10px 4px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 32px;
    }

    .chip {
      color: var(--muted);
      border: 1px solid #252525;
      padding: 7px 12px;
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: all 0.18s;
    }

    .chip:hover {
      color: var(--white);
      border-color: var(--red);
    }

    .result-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 22px;
    }

    .result-card {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
      text-decoration: none;
      color: var(--white);
      background: #111;
      border: 1px solid #1f1f1f;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
      overflow: hidden;
    }

    .result-card:hover {
      transform: translateY(-2px);
      border-color: #444;
      background: #151515;
    }

    .thumb {
      aspect-ratio: 3 / 4;
      background: #151515;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.95);
      transition: transform 0.35s, filter 0.35s;
    }

    .result-card:hover .thumb img {
      transform: scale(1.04);
      filter: saturate(1.1);
    }

    .result-body {
      padding: 18px;
    }

    .type {
      display: inline-flex;
      color: var(--white);
      background: var(--red);
      padding: 4px 9px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .result-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .result-desc {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      letter-spacing: 0.03em;
    }

    .empty {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      padding: 52px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      line-height: 1.8;
      text-transform: uppercase;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 28px 32px;
      color: var(--muted);
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .results { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      header { padding: 14px 16px; }
      main { width: calc(100% - 28px); padding-top: 36px; }
      .search-form { grid-template-columns: 1fr; }
      .results { grid-template-columns: 1fr; }
      .result-card { grid-template-columns: 104px 1fr; grid-template-rows: auto; }
      .thumb { aspect-ratio: 3 / 4; }
      .result-body { padding: 14px; }
      .result-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo-wrap" href="/" aria-label="Apocalypse Closet Home">
      <img src="/Logo-Apocalypse-Closet.webp" width="44" height="44" alt="Apocalypse Closet logo" style="height:44px;width:auto;object-fit:contain;">
      <img src="/wordmark.webp" width="70" height="32" alt="Apocalypse Closet" style="height:32px;width:auto;object-fit:contain;mix-blend-mode:screen;">
    </a>
    <nav>
      <a class="btn" href="/">Home</a>
      <a class="btn" href="/blog.html">Journal</a>
    </nav>
  </header>

  <main>
    <div class="eyebrow">// Internal Search</div>
    <h1>Search<br><span>The Closet</span></h1>

    <form class="search-form" action="/search.html" method="get" role="search" aria-label="Tìm kiếm Apocalypse Closet">
      <input id="q" name="q" type="search" placeholder="Nhập egirl, goth, đồ đen, look 01..." autocomplete="off">
      <button class="btn" type="submit">Search</button>
    </form>

    <div class="chips" aria-label="Gợi ý tìm kiếm">
      <a class="chip" href="/search.html?q=egirl">egirl</a>
      <a class="chip" href="/search.html?q=goth">goth</a>
      <a class="chip" href="/search.html?q=punk">punk</a>
      <a class="chip" href="/search.html?q=dark%20feminine">dark feminine</a>
      <a class="chip" href="/search.html?q=baddie">baddie</a>
      <a class="chip" href="/search.html?q=%C4%91%E1%BB%93%20%C4%91en">đồ đen</a>
    </div>

    <div class="result-meta">
      <span id="result-title">Nhập từ khóa để tìm kiếm</span>
      <span id="result-count">0 results</span>
    </div>

    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <footer>© APOCALYPSE CLOSET</footer>

  <script src="/search-index.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const input = document.getElementById('q');
    const resultsEl = document.getElementById('results');
    const countEl = document.getElementById('result-count');
    const titleEl = document.getElementById('result-title');

    const rawQuery = (params.get('q') || '').trim();
    input.value = rawQuery;

    function normalizeText(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/-/g, ' ')
        .replace(/[^a-z0-9\s#]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function scoreItem(item, query) {
      const q = normalizeText(query);
      if (!q) return 0;

      const title = normalizeText(item.title);
      const type = normalizeText(item.type);
      const desc = normalizeText(item.description);
      const url = normalizeText(item.url);
      const keywords = normalizeText(item.keywords);

      const terms = q.split(' ').filter(Boolean);
      let score = 0;

      if (title === q) score += 80;
      if (title.includes(q)) score += 45;
      if (url.includes(q)) score += 30;
      if (type.includes(q)) score += 20;
      if (desc.includes(q)) score += 18;
      if (keywords.includes(q)) score += 14;

      terms.forEach(term => {
        if (title.includes(term)) score += 10;
        if (url.includes(term)) score += 8;
        if (type.includes(term)) score += 6;
        if (desc.includes(term)) score += 4;
        if (keywords.includes(term)) score += 2;
      });

      return score;
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function render(query) {
      const q = query.trim();

      if (!q) {
        const featured = (window.searchIndex || [])
          .filter(item => item.type === 'Style' || item.type === 'Journal')
          .slice(0, 6);

        titleEl.textContent = 'Gợi ý khám phá';
        countEl.textContent = featured.length + ' items';
        resultsEl.innerHTML = featured.map(cardTemplate).join('');
        return;
      }

      const results = (window.searchIndex || [])
        .map(item => ({ ...item, score: scoreItem(item, q) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.title.localeCompare(b.title))
        .slice(0, 48);

      titleEl.textContent = 'Kết quả cho: ' + q;
      countEl.textContent = results.length + ' results';

      if (!results.length) {
        resultsEl.innerHTML = '<div class="empty">Không tìm thấy kết quả phù hợp.<br>Thử: egirl, goth, punk, dark feminine, đồ đen hoặc look 01.</div>';
        return;
      }

      resultsEl.innerHTML = results.map(cardTemplate).join('');
    }

    function cardTemplate(item) {
      const img = item.image
        ? `<div class="thumb"><img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" loading="lazy"></div>`
        : `<div class="thumb" aria-hidden="true"></div>`;

      return `
        <a class="result-card" href="${escapeHtml(item.url)}">
          ${img}
          <div class="result-body">
            <span class="type">${escapeHtml(item.type)}</span>
            <div class="result-title">${escapeHtml(item.title)}</div>
            <p class="result-desc">${escapeHtml(item.description || item.url)}</p>
          </div>
        </a>
      `;
    }

    render(rawQuery);
  </script>
</body>
</html>

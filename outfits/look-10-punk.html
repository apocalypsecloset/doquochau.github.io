  <style>
    :root {
      --black: #0a0a0a;
      --white: #f0ece4;
      --red: #c0392b;
      --grey: #1a1a1a;
      --muted: #444;
      --muted-light: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--white);

      min-height: 100vh;

      pointer-events: none;
      z-index: 999;
      opacity: 0.3;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;

    .header-left { display: flex; align-items: center; gap: 12px; }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      height: 36px;
      padding: 0 16px;
      border: 1px solid #333;
      background: transparent;
      color: var(--white);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { background: var(--white); color: var(--black); border-color: var(--white); }

    .cat-badge {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 4px 10px;
      opacity: 0.8;
    }

    #btn-save { border-color: #333; color: var(--white); }
    #btn-save.saved { border-color: var(--red); color: var(--red); }
    #btn-save:hover { background: var(--red); color: var(--white); border-color: var(--red); }

    .detail-container {
      display: flex;
      padding: 48px 32px;
      gap: 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .outfit-image-col { flex: 1; position: relative; }

    .slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3/4;
      overflow: hidden;
      border: 1px solid #222;
      background: var(--grey);
      margin: 0 auto;
    }

    .slider-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }

    .slider-track img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background: rgba(10,10,10,0.8);
      border: 1px solid #444;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      border-radius: 50%;
      transition: border-color 0.2s;
    }
    .slider-btn:hover { border-color: var(--white); }
    .btn-prev { left: 12px; }
    .btn-next { right: 12px; }

    .slider-dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: all 0.2s; cursor: pointer; }
    .dot.active { background: var(--white); transform: scale(1.5); }

    .outfit-info-col { flex: 1; }

    .outfit-title {

      margin-bottom: 8px;
    }

    .outfit-desc {

      margin-bottom: 40px;
      line-height: 1.7;
    }

    .section-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;

      margin-bottom: 16px;

      justify-content: space-between;

    .items-list { display: flex; flex-direction: column; gap: 10px; }

    .item-link {

    .item-link:hover { border-color: var(--muted-light); background: #1a1a1a; transform: translateX(5px); }
    .item-link.no-link { cursor: default; opacity: 0.5; }
    .item-link.no-link:hover { transform: none; border-color: #222; background: #111; }

    .item-left { display: flex; align-items: center; gap: 16px; }
    .item-icon { color: var(--red); font-size: 12px; }
    .item-text h3 { font-size: 13px; font-weight: bold; letter-spacing: 0.05em; }
    .item-text p { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; }
    .item-arrow { font-size: 14px; color: var(--muted); }

    .related-section {

    .related-grid {

    .related-card {

      background: var(--grey);

    }
    .related-card img {

      object-fit: cover;
      transition: transform 0.4s ease, filter 0.3s;
      filter: saturate(0.8);
    }
    .related-card:hover img { transform: scale(1.06); filter: saturate(1.1); }
    .related-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .related-card:hover::after { opacity: 1; }
    .related-card-tag {

  <!-- outfits.js từ root (../) -->
  <script src="../outfits.js"></script>

  <script>
    // ID được hardcode — không cần đọc ?id= từ URL
    const OUTFIT_ID = "look-10";
    const outfit    = outfits.find(o => o.id === OUTFIT_ID);
    const mainEl    = document.getElementById('main-content');
    let currentSlide = 0;

    function moveSlide(dir) {
      const track = document.getElementById('slider-track');
      const dots  = document.querySelectorAll('.dot');
      const total = dots.length;
      currentSlide = (currentSlide + dir + total) % total;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }

    function goToSlide(idx) {
      const track = document.getElementById('slider-track');
      const dots  = document.querySelectorAll('.dot');
      currentSlide = idx;
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
    }

    if (outfit && outfit.detail) {
      const d = outfit.detail;

      const imgUrl = (url, size) => url.includes('googleusercontent.com') ? url + size : url;

      const imagesHTML = d.imgs.map((img, i) =>
        i === 0
          ? `<img src="${imgUrl(img, '=w900')}" alt="${d.title}" fetchpriority="high" decoding="async">`
          : `<img src="${imgUrl(img, '=w900')}" alt="${d.title}" loading="lazy" decoding="async">`
      ).join('');

      const dotsHTML = d.imgs.length > 1
        ? d.imgs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')
        : '';

      const itemsHTML = d.items.map(item => {
        const hasLink = item.link && item.link !== '#';
        return `
          <a href="${hasLink ? item.link : '#'}"
             ${hasLink ? 'target="_blank" rel="nofollow noopener"' : ''}
             class="item-link${hasLink ? '' : ' no-link'}">
            <div class="item-left">
              <div class="item-icon">&#10022;</div>
              <div class="item-text">
                <h3>${item.name}</h3>
                <p>${item.type}${hasLink ? '' : ' — COMING SOON'}</p>
              </div>
            </div>
            <div class="item-arrow">${hasLink ? '&#8594;' : '&#8212;'}</div>
          </a>`;
      }).join('');

      mainEl.innerHTML = `
        <div class="outfit-image-col">
          <div class="slider-wrapper">
            <div class="slider-track" id="slider-track">${imagesHTML}</div>
            ${d.imgs.length > 1 ? `
              <button class="slider-btn btn-prev" onclick="moveSlide(-1)">&#10094;</button>
              <button class="slider-btn btn-next" onclick="moveSlide(1)">&#10095;</button>
              <div class="slider-dots">${dotsHTML}</div>
            ` : ''}
          </div>
        </div>
        <div class="outfit-info-col">
          <h1 class="outfit-title">${d.title}</h1>
          <p class="outfit-desc">${d.desc}</p>
          <div class="section-title">
            <span>DANH SÁCH MUA ĐỒ</span>
            <span>${d.items.length} MÓN</span>
          </div>
          <div class="items-list">${itemsHTML}</div>
        </div>
      `;

      // Related outfits — dùng slug cho href
      const related = outfits
        .filter(o => o.category === outfit.category && o.id !== outfit.id)
        .slice(0, 4);

      if (related.length > 0) {
        const relHTML = related.map(o => `
          <div class="related-card" onclick="window.location.href='/outfits/${o.slug}.html'">
            <img src="${imgUrl(o.img, '=w600')}" alt="${o.tag}" loading="lazy" decoding="async">
            <div class="related-card-tag">${o.tag}</div>
          </div>
        `).join('');

        document.getElementById('related-wrap').innerHTML = `
          <div class="related-section">
            <div class="related-label">More ${outfit.category}</div>
            <div class="related-grid">${relHTML}</div>
          </div>
        `;
      }
    }
  </script>

  <!-- Firebase — defer sau khi trang render xong -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const fbScript = document.createElement('script');
        fbScript.type = 'module';
        fbScript.innerHTML = `
          import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
          import { getAuth, onAuthStateChanged }
                                       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
          import { getFirestore, doc, setDoc, deleteDoc, getDoc }
                                       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

          const firebaseConfig = {
            apiKey:            "AIzaSyD6S4HYT_QzltQSJjGbLe-vJljQixxpDco",
            authDomain:        "apocalypse-closet.firebaseapp.com",
            projectId:         "apocalypse-closet",
            storageBucket:     "apocalypse-closet.firebasestorage.app",
            messagingSenderId: "493697340280",
            appId:             "1:493697340280:web:9db33f9844c77d95232e8d"
          };

          const app  = initializeApp(firebaseConfig);
          const auth = getAuth(app);
          const db   = getFirestore(app);
          const _outfit = (typeof outfits !== 'undefined') ? outfits.find(o => o.id === "look-10") : null;

          onAuthStateChanged(auth, async user => {
            const btn = document.getElementById('btn-save');
            if (!btn || !_outfit) return;

            if (!user) {
              btn.onclick = () => { window.location.href = '../login.html'; };
              return;
            }

            localStorage.setItem('ac_user', JSON.stringify({
              name: user.displayName || '', email: user.email,
              picture: user.photoURL || '', sub: user.uid
            }));

            const ref = doc(db, 'users', user.uid, 'closet', _outfit.id);
            const snap = await getDoc(ref);
            let isSaved = snap.exists();
            btn.innerHTML = isSaved ? '&#9829; SAVED' : '&#9825; SAVE';
            if (isSaved) btn.classList.add('saved');

            btn.onclick = async () => {
              if (isSaved) {
                await deleteDoc(ref);
                isSaved = false;
                btn.innerHTML = '&#9825; SAVE';
                btn.classList.remove('saved');
              } else {
                await setDoc(ref, {
                  id: _outfit.id, title: _outfit.detail?.title || _outfit.title,
                  image: _outfit.img, category: _outfit.category,
                  savedAt: Date.now()
                });
                isSaved = true;
                btn.innerHTML = '&#9829; SAVED';
                btn.classList.add('saved');
              }
            };
          });
        `;
        document.body.appendChild(fbScript);
      }, 1500);
    });
  </script>
